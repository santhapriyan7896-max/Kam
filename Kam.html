<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: 'Georgia', serif; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: crosshair; }
        .message-layer {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; background: #fffaf0; color: #333;
            text-align: center; z-index: 1; padding: 20px;
        }
        h1 { font-size: 2.5rem; color: #b03060; }
        p { font-size: 1.2rem; line-height: 1.6; max-width: 80%; }
    </style>
</head>
<body>

    <div class="message-layer">
        <h1>Hey [Her Name],</h1>
        <p>I really appreciate your eye for beauty and art.<br>
        I’ve been wanting to ask... would you like to go to an art gallery (or grab coffee) with me sometime?</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Fill with an "artistic" cover (a textured grey/paint look)
            ctx.fillStyle = '#444'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = '20px Georgia';
            ctx.fillText('Clear the canvas...', canvas.width/2 - 80, canvas.height/2);
        }

        function scratch(e) {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 40, 0, Math.PI * 2);
            ctx.fill();
        }

        window.addEventListener('resize', resize);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', scratch);
        resize();
    </script>
</body>
</html>
